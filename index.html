<!doctype html>
<html>
<h1>blablacar bus clicker</h1>
<h2 id='scoreBox'></h2>
<h3 id='subScore'>-1</h3>
<style>
    #balloon {
        /* position:absolute; */
        -webkit-transition: all 0.2s;
        height: 500px;
        float: right
    }

    #subScore {
        /* font-size: 100px; */
        display: inline-block;
    }

    #hello {
        cursor: not-allowed;
        width: 50px;
        height: 50px;
        position: fixed;
        bottom: 0;
        left: 0;

    }

    #youwon {
        display: none;
        /* <-- hide */
    }

    #youlost {
        display: none;
    }
</style>
<img id='balloon' src='https://newsroom.blablacar.com/wp-content/uploads/2019/07/19.jpg'>
<img id="youwon" src="won.png">
<img id="youlost" src="youlost.jpeg">
<div id="hello"></div>
<div id="buy">buy button x2 £10</div>
<div id="refresh">reset</div>
<script>
    balloon.addEventListener('click', clickedIt);
    var score = 0, count = 0;
    var increment = 1
    function clickedIt() {
        score = score + increment;
        scoreBox.innerHTML = 'score:' + score;
        // balloon.style.height='1px';
        subScore.innerHTML = '-1 from ' + score;
        if (score >= 1000000) {
            youwon.setAttribute('style', 'display:block') // <-- show
            balloon.setAttribute('style', 'display:none')
            const clickSound = new Audio("youwon.m4a");
            clickSound.play();
        }
        if (score <= -1) {
            youlost.setAttribute('style', 'display:block')
            balloon.setAttribute('style', 'display:none')
            const clickSound = new Audio("gameoversoundaffect.mp3");
            clickSound.play();
        }
    }
    buy.addEventListener('click', clickedknow);
    function clickedknow() {
        cost = increment * 10
        increment++
        score = score - cost
        scoreBox.innerHTML = 'score minus 10:' + score
        buy.innerHTML = "buy button x" + increment + " £" + cost
    }
    scoreBox.addEventListener('click', clickedscore);
    function clickedscore() {
        score--;
        scoreBox.innerHTML = 'score booooooo:' + score;
        subScore.innerHTML = '-1:' + score;
        // balloon.style.height='1px';
    }
    subScore.addEventListener('click', clickedwhen);
    function clickedwhen() {
        score--;
        subScore.innerHTML = '-1:' + score;
        // balloon.style.height='1px';
        scoreBox.innerHTML = 'score:' + score;
        if (score <= -1) {
            youlost.setAttribute('style', 'display:block')
            subScore.setAttribute('style', 'display:none')
            const clickSound = new Audio("gameoversoundaffect.mp3");
            clickSound.play();
        }
    }
    hello.addEventListener('click', clickedhow);
    function clickedhow() {
        score = score + 500000;
        scoreBox.innerHTML = 'you have found the secret button. your score will increace by 1000! score=' + score;
    }

</script>
<audio controls autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

</html>
